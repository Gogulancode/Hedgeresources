<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1b4332" />
    <title>HEGDE Resources - Sustainable Products & Eco-Friendly Solutions</title>
    <meta name="description" content="Leading Indian exporter of organic fertilizers and sustainable packaging. Discover eco-friendly products for agriculture and business. Fostering conscious consumption for a healthier planet." />
    <meta name="keywords" content="organic fertilizers, sustainable packaging, eco-friendly products, vermicompost, biodegradable packaging, Indian exporter, sustainable agriculture" />
    <meta name="author" content="HEGDE Resources" />

    <meta property="og:title" content="HEGDE Resources - Sustainable Products & Eco-Friendly Solutions" />
    <meta property="og:description" content="Leading Indian exporter of organic fertilizers and sustainable packaging. Making the world greener one product at a time." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/android-chrome-512x512.png" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="HEGDE Resources - Sustainable Products" />
    <meta name="twitter:description" content="Organic fertilizers & sustainable packaging for a greener planet" />
    <meta name="twitter:image" content="/android-chrome-512x512.png" />
    
    <!-- Favicon -->
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="manifest" href="/site.webmanifest">
    <link rel="shortcut icon" href="/favicon.ico">

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@500;600;700;800&display=swap" rel="stylesheet" media="print" onload="this.media='all'" />

    <!-- JSON-LD Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "HEGDE Resources",
      "url": "https://hegderesources.com",
      "logo": "https://hegderesources.com/android-chrome-512x512.png",
      "description": "Leading Indian exporter of organic fertilizers, sustainable packaging, and eco-friendly products.",
      "address": {
        "@type": "PostalAddress",
        "addressCountry": "IN"
      },
      "sameAs": [],
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "sales",
        "availableLanguage": ["English"]
      }
    }
    </script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "HEGDE Resources",
      "url": "https://hegderesources.com",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://hegderesources.com/products?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>
  </head>

  <body>
    <div id="root">
      <!-- Inline app shell for fast FCP — replaced by React on hydration -->
      <style>
        .app-shell{display:flex;flex-direction:column;min-height:100vh;background:#fff}
        .app-shell-nav{height:64px;background:#1b4332;display:flex;align-items:center;padding:0 1.5rem}
        .app-shell-logo{color:#fff;font-weight:700;font-size:1.25rem;font-family:system-ui,sans-serif}
        .app-shell-hero{flex:1;background:#1b4332;display:flex;align-items:center;justify-content:center;min-height:60vh}
        .app-shell-spinner{width:40px;height:40px;border:3px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite}
        @keyframes spin{to{transform:rotate(360deg)}}
      </style>
      <div class="app-shell">
        <div class="app-shell-nav">
          <span class="app-shell-logo">HEGDE Resources</span>
        </div>
        <div class="app-shell-hero">
          <div class="app-shell-spinner"></div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
